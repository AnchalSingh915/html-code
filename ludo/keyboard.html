<!doctype html>
<html>
<head>
<title>Keyboard</title>
      <style>
	    .td{
		     height:40px;
			 width:60px;
			 border-radius:5px 5px 5px 5px;
			 background-color:#3f9669;
			 color:white;
			 font-size:15px;
		   }
	    .tdBack,.tdEnter{
		          height:40px;
			      width:100px;
				   border-radius:5px 5px 5px 5px;
				   background-color:#3f9669;
			       color:white;
			       font-size:15px;
		       }
        .tdTab,.tdShift,.tdCtrl,.tdMenu,.tdAlt,.tdWin,.tdCaps{
		           height:40px;
			       width:80px;
				   border-radius:5px 5px 5px 5px;
				   background-color:#3f9669;
			       color:white;
			       font-size:15px;
		       }
        .tdSpace{
		          height:40px;
			      width:280px;
				   border-radius:5px 5px 5px 5px;
				   background-color:#3f9669;
			       color:white;
			       font-size:15px;
		        }
        #box{
		      border:1px solid transparent;
			  width:970px;
			  border-radius:10px 10px 10px 10px;
			  margin:auto;
			  margin-top:130px;
			  background:#f0f0f0;
		    }
        #tr1{
		     margin:15px;
			 margin-top:15px;
			 margin-bottom:15px;
		    }
        #tr2{
		     margin:20px;
			 margin-top:15px;
			 margin-bottom:15px;
		    }
        #tr3{
		     margin:25px;
			 margin-top:15px;
			 margin-bottom:15px;
		    }
        #tr4{
		     margin:55px;
			 margin-top:15px;
			 margin-bottom:15px;
		    }
        #tr5{
		     margin:38px;
			 margin-top:15px;
			 margin-bottom:15px;
		    }
        button:hover{
		           background-color:#0bb85e;
		         }		
	  </style>
</head>
<body>
     <div id="box">
	    <div id="tr1">
		    <button class="td">~</button>
		    <button class="td">1</button>
			<button class="td">2</button>
			<button class="td">3</button>
			<button class="td">4</button>
			<button class="td">5</button>
			<button class="td">6</button>
			<button class="td">7</button>
			<button class="td">8</button>
			<button class="td">9</button>
			<button class="td">0</button>
			<button class="td">-</button>
			<button class="td">=</button>
			<button class="tdBack">Backspace</button>
		</div>
		<div id="tr2">
		    <button class="tdTab">Tab</button>
			<button class="td">Q</button>
			<button class="td">W</button>
			<button class="td">E</button>
			<button class="td">R</button>
			<button class="td">T</button>
			<button class="td">Y</button>
			<button class="td">U</button>
			<button class="td">I</button>
			<button class="td">O</button>
			<button class="td">p</button>
			<button class="td">[</button>
			<button class="td">]</button>
			<button class="td">\</button>
		</div>
		<div id="tr3">
			<button class="tdCaps">Caps Lock</button>
			<button class="td">A</button>
			<button class="td">S</button>
			<button class="td">D</button>
			<button class="td">F</button>
			<button class="td">G</button>
			<button class="td">H</button>
			<button class="td">J</button>
			<button class="td">K</button>
			<button class="td">L</button>
			<button class="td">;</button>
			<button class="td">'</button>
			<button class="tdEnter">Enter</button>
		</div>
		<div id="tr4">
		    <button class="tdShift">Shift</button>
			<button class="td">Z</button>
			<button class="td">X</button>
			<button class="td">C</button>
			<button class="td">V</button>
			<button class="td">B</button>
			<button class="td">N</button>
			<button class="td">M</button>
			<button class="td">,</button>
			<button class="td">.</button>
			<button class="td">/</button>
			<button class="tdShift">Shift</button>
		</div>
		<div id="tr5">
			<button class="tdCtrl">Ctrl</button>
			<button class="tdWin">Win</button>
			<button class="tdAlt">Alt</button>
			<button class="tdSpace">Space</button>
			<button class="tdWin">Win</button>
			<button class="tdMenu">Menu</button>
			<button class="tdCtrl">Ctrl</button>
		</div>
	 </div>
</body>
</html>
