<!doctype html>
<html>
<head>
<title>Calculator</title>
      <style>
	      table{
		         margin-top:100px;
				 border:10px solid grey;
				 width:250px;
				 background:grey;
				 box-shadow:3px 3px 3px black;
		       }
		  input[type="button"]
             { 
			    width:50px;
				height:50px;
				background:skyblue;
				color:white;
				font-size:20px;
				box-shadow:1px 1px 1px white;
			 }
		  input[type="text"]
             { 
			    width:215px;
				height:50px;
				font-size:20px;
			 }
		  input[type="button"]:hover
             { 
			    width:50px;
				height:50px;
				background:blue;
			 }    
	  </style>
</head>
<body>
      <table align="center">
	    <tr>
		    <td colspan="4"><input type="text" value="0" readonly/></td>
		</tr>
		<tr>
		    <th><input type="button" value="C"/></th>
			<th><input type="button" value="%"/></th>
			<th><input type="button" value="&lArr;"/></th>
			<th><input type="button" value="/"/></th>
		</tr>
		<tr>
		    <th><input type="button" value="7"/></th>
			<th><input type="button" value="8"/></th>
			<th><input type="button" value="9"/></th>
			<th><input type="button" value="*"/></th>
		</tr>
		<tr>
		    <th><input type="button" value="4"/></th>
			<th><input type="button" value="5"/></th>
			<th><input type="button" value="6"/></th>
			<th><input type="button" value="-"/></th>
		</tr>
		<tr>
		    <th><input type="button" value="3"/></th>
			<th><input type="button" value="2"/></th>
			<th><input type="button" value="1"/></th>
			<th><input type="button" value="+"/></th>
		</tr>
		<tr>
		    <th><input type="button" value="00"/></th>
			<th><input type="button" value="0"/></th>
			<th><input type="button" value="."/></th>
			<th><input type="button" value="="/></th>
		</tr>
	  </table>
</body>
</html>
